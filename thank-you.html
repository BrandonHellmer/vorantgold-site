<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Vorant Gold</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap');
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #050505 0%, #090909 100%);
      color: #f5f2ea;
      font-family: Inter, system-ui, sans-serif;
    }
    .wrap {
      max-width: 760px;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 1rem;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3rem, 6vw, 5rem);
      color: #e4c97c;
      line-height: 1.05;
    }
    p {
      margin: 0 0 1rem;
      color: #b8b0a3;
      font-size: 1.05rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #e4c97c, #c9a24a);
      color: #111;
      text-decoration: none;
      font-weight: 800;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Thank You</h1>
    <p>Your concierge request has been received.</p>
    <p>Vorant Gold will review the details and follow up shortly.</p>
    <a href="https://www.vorantgold.com/">Return to Homepage</a>
  </div>
</body>
</html>
